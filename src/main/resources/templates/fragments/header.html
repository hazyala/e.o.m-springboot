<header class="dashboard-header" th:fragment="header" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <a class="dashboard-logo" th:href="@{/}">Echo of Movement</a>
    <form class="dashboard-search" th:action="@{/posts}" role="search">
        <span aria-hidden="true">⌕</span>
        <input type="search" name="tag" placeholder="Search" aria-label="Search">
    </form>
    <nav class="dashboard-nav" aria-label="Dashboard navigation">
        <a class="dashboard-add-button" href="#">Add New<span class="subtitle">새 글을 작성하세요</span></a>
        <a th:href="@{/dashboard}">Dash<span class="subtitle">오늘의 움직임</span></a>
        <a th:href="@{/boards/SHOW}">Show<span class="subtitle">당신을 보여주세요</span></a>
        <a th:href="@{/boards/CAST}">Cast<span class="subtitle">공연 기회를 만나세요</span></a>
        <a th:href="@{/boards/HYPE}">Hype<span class="subtitle">움직임에 열광을 더하세요</span></a>
        <a th:href="@{/boards/LINK}">Link<span class="subtitle">세상과 연결되세요</span></a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin<span class="subtitle">운영 도구</span></a>
    </nav>
    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
        <button class="dashboard-logout" type="submit">Logout<span class="subtitle">계정에서 나가기</span></button>
    </form>
    <button class="dashboard-theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">☼</button>
</header>
