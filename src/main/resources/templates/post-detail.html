<!doctype html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${post.title + ' | E.O.M'}">Post | E.O.M</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Irish+Grover&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="dashboard-page">
<header class="dashboard-header">
    <a class="dashboard-logo" th:href="@{/}">Echo of Movement</a>
    <form class="dashboard-search" th:action="@{/posts}" role="search">
        <span aria-hidden="true">⌕</span>
        <input type="search" name="tag" placeholder="Search tags" aria-label="Search tags">
    </form>
    <nav class="dashboard-nav" aria-label="Community navigation">
        <a th:href="@{/dashboard}">Dash<span class="subtitle">오늘의 움직임</span></a>
        <a th:each="board : ${boards}" th:href="@{/boards/{board}(board=${board.name()})}" th:text="${board.label}">Show</a>
        <a th:href="@{/activity}">Activity<span class="subtitle">최신 글 목록</span></a>
        <a th:href="@{/events}">Events<span class="subtitle">이번 달 공식 행사</span></a>
        <a th:href="@{/dancers}">Dancers<span class="subtitle">장르별 댄서 탐색</span></a>
    </nav>
    <button class="dashboard-theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">☼</button>
</header>

<main class="community-shell">
    <article class="post-detail-card" th:classappend="| board-${post.boardType.name().toLowerCase()}|">
        <div class="post-detail-media">
            <img th:if="${post.thumbnailUrl}" th:src="${post.thumbnailUrl}" th:alt="${post.title}">
            <div class="post-detail-media-badge" th:if="${post.mediaType.name() != 'IMAGE'}">
                <span th:text="${post.mediaType.name() == 'INSTAGRAM'} ? 'External Instagram Media' : 'External Media Link'">External Media</span>
            </div>
        </div>
        <div class="post-detail-copy">
            <a th:href="@{/boards/{board}(board=${post.boardType.name()})}"
               class="dashboard-type"
               th:classappend="| type-${post.boardType.name().toLowerCase()}|"
               th:text="${post.boardType.label}">SHOW</a>
            <h1 th:text="${post.title}">Post title</h1>
            <div class="post-detail-meta-grid">
                <span th:text="|Writer · ${post.author.displayName}|">Writer</span>
                <span th:if="${post.author.crewName}" th:text="|Crew · ${post.author.crewName}|">Crew</span>
                <span th:text="|Board · ${post.boardType.label}|">Board</span>
                <span th:if="${post.location}" th:text="|Location · ${post.location}|">Location</span>
                <time th:if="${post.eventDate}" th:datetime="${post.eventDate}" th:text="|Event · ${#temporals.format(post.eventDate, 'yyyy.MM.dd')}|">Event</time>
                <time th:if="${post.deadline}" th:datetime="${post.deadline}" th:text="|Deadline · ${#temporals.format(post.deadline, 'yyyy.MM.dd')}|">Deadline</time>
            </div>
            <p th:text="${post.content}">Content</p>
            <div class="dashboard-quick-stats">
                <span class="dashboard-stat-like"><i aria-hidden="true"></i><b th:text="${post.likeCount}">0</b></span>
                <span class="dashboard-stat-comment"><i aria-hidden="true"></i><b th:text="${post.commentCount}">0</b></span>
                <span class="dashboard-stat-view"><i aria-hidden="true"></i><b th:text="${post.viewCount}">0</b></span>
            </div>
            <div class="post-detail-actions">
                <a th:if="${post.mediaUrl}" th:href="${post.mediaUrl}" target="_blank" rel="noreferrer">OPEN MEDIA</a>
                <a th:if="${post.instagramUrl}" th:href="${post.instagramUrl}" target="_blank" rel="noreferrer">INSTAGRAM</a>
            </div>
        </div>
    </article>
</main>

<footer class="dashboard-footer">
    <div>
        <strong>Echo of Movement</strong>
        <span>WE DON'T JUST MOVE, WE ECHO.</span>
    </div>
    <p>© 2026 E.O.M</p>
</footer>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
