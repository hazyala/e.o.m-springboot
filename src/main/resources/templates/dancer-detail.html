<!doctype html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${dancer.displayName + ' | E.O.M'}">Dancer | E.O.M</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Irish+Grover&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="dashboard-page">
<div th:replace="~{fragments/header :: header}"></div>

<main class="community-shell">
    <section class="dancer-profile">
        <img th:src="${dancer.profileImageUrl}" th:alt="${dancer.displayName}">
        <div>
            <p>DANCER PROFILE</p>
            <h1 th:text="${dancer.displayName}">Dancer</h1>
            <span th:if="${dancer.crewName}" th:text="${dancer.crewName}">Crew</span>
            <p th:text="${dancer.bio}">Bio</p>
            <a th:if="${dancer.instagramUrl}" th:href="${dancer.instagramUrl}" target="_blank" rel="noreferrer">INSTAGRAM</a>
        </div>
    </section>
</main>

<footer class="dashboard-footer">
    <div>
        <strong>Echo of Movement</strong>
        <span>WE DON’T JUST MOVE, WE ECHO.</span>
    </div>
    <p>© 2026 E.O.M</p>
</footer>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
